name: Auto Translate README

on:
  push:
    branches: [master]
    paths: ['README.md']
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Translate README with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'EOF'
          import requests
          import os
          import time

          with open("README.md", "r", encoding="utf-8") as f:
              content = f.read()

          api_key = os.environ["GEMINI_API_KEY"]
          url = f"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={api_key}"

          languages = {
              "tr": "Turkish",
              "az": "Azerbaijani",
              "de": "German",
              "fr": "French",
              "es": "Spanish",
              "it": "Italian",
              "pt": "Portuguese",
              "ru": "Russian",
              "zh": "Chinese (Simplified)",
              "ja": "Japanese",
              "ko": "Korean",
              "ar": "Arabic",
              "hi": "Hindi",
              "nl": "Dutch",
              "pl": "Polish",
              "sv": "Swedish",
              "uk": "Ukrainian",
              "cs": "Czech",
              "ro": "Romanian",
              "hu": "Hungarian",
              "fi": "Finnish",
              "da": "Danish",
              "no": "Norwegian",
              "el": "Greek",
              "id": "Indonesian",
          }

          prompt_template = """Translate the following Markdown README file to {language}.

          Important rules:
          - Keep all Markdown formatting (headers, bold, code blocks, links, badges) exactly as-is
          - Do NOT translate code blocks, commands, file paths, or technical terms
          - Do NOT translate proper nouns like "Tock", "Rust", "Cortex-M", "RISC-V"
          - Do NOT translate badge URLs or links
          - Only translate the human-readable text
          - Return only the translated Markdown, nothing else

          README content:
          {content}"""

          for code, language in languages.items():
              print(f"Translating to {language}...")

              payload = {
                  "contents": [{
                      "parts": [{
                          "text": prompt_template.format(
                              language=language,
                              content=content
                          )
                      }]
                  }],
                  "generationConfig": {
                      "temperature": 0.1,
                      "maxOutputTokens": 8192,
                  }
              }

              try:
                  res = requests.post(url, json=payload)
                  res.raise_for_status()
                  data = res.json()
                  translated = data["candidates"][0]["content"]["parts"][0]["text"]

                  # Gemini bazen ```markdown ile sarar, temizle
                  if translated.startswith("```markdown"):
                      translated = translated[len("```markdown"):].strip()
                  if translated.startswith("```"):
                      translated = translated[3:].strip()
                  if translated.endswith("```"):
                      translated = translated[:-3].strip()

                  with open(f"README.{code}.md", "w", encoding="utf-8") as f:
                      f.write(translated)

                  print(f"  OK README.{code}.md saved")

              except Exception as e:
                  print(f"  FAILED {language}: {e}")

              time.sleep(1)

          print("Done!")
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs: auto-translate README to 25 languages via Gemini"
          branch: auto-translate-readme
          title: "docs: auto-translate README to 25 languages"
          body: |
            ## Auto Translation

            README.md was updated and automatically translated to 25 languages using Gemini API.

            ### Languages added/updated:
            Turkish, Azerbaijani, German, French, Spanish,
            Italian, Portuguese, Russian, Chinese, Japanese,
            Korean, Arabic, Hindi, Dutch, Polish,
            Swedish, Ukrainian, Czech, Romanian, Hungarian,
            Finnish, Danish, Norwegian, Greek, Indonesian

            > Auto-generated by auto-translate workflow
          labels: documentation, translation
